name: Supabase Keep Alive

on:
  schedule:
    # Roda todo dia às 12:00 UTC (09:00 BRT)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sSf "https://ggyzxyhyoewwvprgccuq.supabase.co/rest/v1/trainers?select=id&limit=1" \
            -H "apikey: sb_publishable_zrnufccn5mlNgbmrvb6DiQ_2wz5OM-U" \
            -H "Authorization: Bearer sb_publishable_zrnufccn5mlNgbmrvb6DiQ_2wz5OM-U" \
            -o /dev/null && echo "Supabase ping OK"
